<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">

 <rect width="600" height="200" fill="#081120"/>

 <path d="M90 150
          C140 70,250 60,300 110
          S450 170,520 50"
       fill="none"
       stroke="#00d4ff"
       stroke-width="5"/>

 <circle cx="90" cy="150" r="8" fill="#00d4ff"/>
 <circle cx="300" cy="110" r="8" fill="#00d4ff"/>
 <circle cx="520" cy="50" r="10" fill="#72efdd"/>

 <circle cx="520" cy="50" r="25"
         fill="none"
         stroke="#72efdd"
         opacity="0.4">
      <animate attributeName="r"
               values="10;25;10"
               dur="2s"
               repeatCount="indefinite"/>
 </circle>

 <text x="430" y="40"
       fill="#72efdd"
       font-size="20">
       +18%
 </text>

</svg>

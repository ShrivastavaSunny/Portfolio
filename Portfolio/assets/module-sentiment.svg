<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="100%" height="100%">
  <rect width="600" height="200" rx="8" fill="#0b132b"/>
  <rect x="80" y="120" width="40" height="40" rx="4" fill="#ff4d6d" opacity="0.4"/>
  <rect x="160" y="100" width="40" height="60" rx="4" fill="#ff758f" opacity="0.6"/>
  <rect x="240" y="70" width="40" height="90" rx="4" fill="#e0aaff"/>
  <rect x="320" y="50" width="40" height="110" rx="4" fill="#4ea8de" />
  <rect x="400" y="30" width="40" height="130" rx="4" fill="#56cfe1" />
  <rect x="480" y="20" width="40" height="140" rx="4" fill="#72efdd" />
  <line x1="50" y1="160" x2="550" y2="160" stroke="#1c2541" stroke-width="2"/>
  <!-- subtle animations on bars -->
  <rect x="320" y="50" width="40" height="110" rx="4" fill="#4ea8de">
    <animate attributeName="y" values="70;50;70" dur="3s" repeatCount="indefinite" />
  </rect>
  <rect x="400" y="30" width="40" height="130" rx="4" fill="#56cfe1">
    <animate attributeName="y" values="50;30;50" dur="3.2s" repeatCount="indefinite" />
  </rect>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="100%" height="100%">
  <rect width="600" height="200" rx="8" fill="#0b132b"/>
  <line x1="50" y1="20" x2="50" y2="160" stroke="#1c2541" stroke-width="1"/>
  <line x1="170" y1="20" x2="170" y2="160" stroke="#1c2541" stroke-width="1"/>
  <line x1="290" y1="20" x2="290" y2="160" stroke="#1c2541" stroke-width="1"/>
  <line x1="410" y1="20" x2="410" y2="160" stroke="#1c2541" stroke-width="1"/>
  <line x1="530" y1="20" x2="530" y2="160" stroke="#1c2541" stroke-width="1"/>
  <line x1="50" y1="160" x2="550" y2="160" stroke="#1c2541" stroke-width="2"/>
  <path d="M 50 130 Q 110 140 170 90 T 290 100" fill="none" stroke="#5c677d" stroke-width="3" stroke-dasharray="5,5"/>
  <path d="M 290 100 Q 350 60 410 50 T 530 30" fill="none" stroke="#4ea8de" stroke-width="4"/>
  <path d="M 290 100 Q 350 60 410 50 T 530 30 L 530 160 L 290 160 Z" fill="url(#gradient-forecast)" opacity="0.15"/>
  <circle cx="290" cy="100" r="6" fill="#4ea8de"/>
  <circle cx="410" cy="50" r="4" fill="#56cfe1"/>
  <circle cx="530" cy="30" r="6" fill="#72efdd"/>
  <defs>
    <linearGradient id="gradient-forecast" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ea8de"/>
      <stop offset="100%" stop-color="#4ea8de" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- simple animation for forecast path -->
  <path d="M 290 100 Q 350 60 410 50 T 530 30" fill="none" stroke="#7ef0c5" stroke-width="2" stroke-opacity="0.6">
    <animate attributeName="stroke-dashoffset" from="0" to="100" dur="3s" repeatCount="indefinite"/>
  </path>
</svg>
